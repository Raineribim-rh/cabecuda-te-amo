<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<style>

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden; /* ISSO REMOVE A ÁREA BRANCA */
  background:black;
  font-family:Arial;
}

/* FUNDO VIDEO */

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-10;
  filter:brightness(.2);
}

/* CAMADA PRINCIPAL */

#world{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:2;
}

/* HEADER */

.header{
  position:relative;
  text-align:center;
  padding-top:20px;
  z-index:5;
  color:white;
}

.header h1{
  font-size:3rem;
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
  background:#ff2e63;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
}

/* ITENS FLUTUANTES */

.item{
  position:absolute;
  padding:8px 12px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  border-radius:999px;
  cursor:pointer;
  color:white;
  font-size:13px;
  backdrop-filter:blur(8px);
  animation:float linear infinite;
  user-select:none;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-120vh);}
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.popup.active{
  display:flex;
}

.box{
  width:90%;
  max-width:500px;
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
  text-align:center;
  position:relative;
}

.box h2{
  color:#ff2e63;
  margin-bottom:10px;
}

/* X */

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" autoplay loop playsinline>
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>
</div>

<!-- MUNDO -->
<div id="world"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="t"></h2>
    <p id="p"></p>
  </div>
</div>

<script>

const world = document.getElementById("world");

/* SOM */

function ativarSom(){
  const v = document.getElementById("video");
  v.muted = false;
  v.volume = 1;
}

/* 40+ ITENS */

const itens = [
["Cabeçona","Sua cabeça é gigantesca e perfeita 😭❤️"],
["Testona","IMAX nível cinema 😩"],
["Bundona","Gravidade própria 😭"],
["Rabão","O mundo desacelera 😩"],
["Xerecona","Perfeição proibida 😳❤️"],
["Xulé","Arma biológica ☣️😭"],
["Cheiro","Seu cheiro vicia 😩"],
["Abraço","Seu abraço cura tudo ❤️"],
["Sentada","Impacto global 😭"],
["Gemido","Spotify deveria te contratar 😩"],
["Beiço","Beiço de periquito lindo 😭❤️"],
["Beijo","Apaga minha mente 😩"],
["Boca","Injustamente perfeita 😭"],
["Olhos","Me desmonta ❤️"],
["Sorriso","Meu ponto fraco 😩"],
["Dormindo","Anjo bugado 😭"],
["Brava","Mesmo assim linda 😩"],
["Manhosa","Perfeição emocional ❤️"],
["Dengosa","Vício total 😭"],
["Cheiro cabelo","Insano 😩"],
["Pescoço","Zona de perigo ❤️"],
["Nariz","Fofo demais 😭"],
["Orelha","Perfeita 😩"],
["Coxas","Crime internacional 😭"],
["Pés","Injusto 😩"],
["Peito","Perfeição ❤️"],
["Rabudinha","Absurdo 😭"],
["Gostosa","Inacreditável 😩"],
["Delícia","Você é isso ❤️"],
["Amor","Você é tudo 😭"],
["Fuinha","Cara de fuinha perfeita 😩"],
["Risada","Cura qualquer coisa ❤️"],
["Gemidona","Proibido 😭"],
["Abraçona","Segurança total 😩"],
["Cheirosa","Vício absoluto ❤️"],
["Tesão","Definição 😭"],
["Perfeita","Zero defeitos 😩"],
["Vida","Meu tudo ❤️"],
["Minha","Só minha 😭"]
];

/* SPAWN CORRETO */

itens.forEach(i=>{

  const el=document.createElement("div");
  el.className="item";
  el.innerText=i[0];

  el.style.left=Math.random()*90+"vw";
  el.style.animationDuration=(Math.random()*18+10)+"s";

  el.onclick=()=>open(i[0],i[1]);

  world.appendChild(el);

});

/* POPUP */

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("t").innerText=t;
  document.getElementById("p").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
