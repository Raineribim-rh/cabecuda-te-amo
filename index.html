<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  overflow-x:hidden;
  background:black;
  color:white;
  min-height:100vh;
}

/* VIDEO */

.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-20;

  filter:brightness(0.18) blur(1.5px);
  transform:scale(1.03);
}

/* OVERLAY */

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.45));
  z-index:-10;
}

/* BOTÃO SOM */

.sound-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:14px 20px;
  border:none;
  border-radius:999px;
  background:#ff2e63;
  color:white;
  font-weight:800;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 0 25px rgba(255,46,99,.5);
  transition:.3s;
}

.sound-btn:hover{
  transform:scale(1.05);
}

/* GLOW */

.glow{
  position:fixed;
  width:500px;
  height:500px;
  background:#ff2e63;
  filter:blur(140px);
  opacity:.22;
  border-radius:50%;
  z-index:-5;
  animation:move 8s infinite alternate;
}

.glow2{
  right:-120px;
  bottom:-120px;
  background:#ff7aa2;
}

@keyframes move{
  from{transform:translate(0,0);}
  to{transform:translate(60px,-40px);}
}

/* CONTAINER */

.container{
  width:100%;
  max-width:1450px;
  margin:auto;
  padding:40px 20px 100px;
  position:relative;
  z-index:2;
}

/* TITULO */

.title{
  text-align:center;
  margin-bottom:35px;
}

.title h1{
  font-size:5rem;
  font-weight:800;
  background:linear-gradient(90deg,#fff,#ff9ab7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  transition:.5s;
}

.title p{
  margin-top:10px;
  font-size:1.2rem;
  opacity:.9;
}

/* CABEÇA */

.head-wrapper{
  position:relative;
  width:340px;
  height:420px;
  margin:0 auto 50px;
  animation:float 3s ease-in-out infinite;
}

.head-shadow{
  position:absolute;
  width:260px;
  height:70px;
  background:rgba(0,0,0,.45);
  border-radius:50%;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  filter:blur(20px);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  background:#ffd4b8;
  border:7px solid #111;
  border-radius:55% 55% 52% 52%;
}

.hair{
  position:absolute;
  width:115%;
  height:190px;
  background:#111;
  left:-7%;
  top:-10px;
  border-radius:60%;
}

.eye{
  position:absolute;
  width:45px;
  height:45px;
  background:#111;
  border-radius:50%;
  top:165px;
}

.left{left:80px;}
.right{right:80px;}

.mouth{
  position:absolute;
  width:110px;
  height:50px;
  border-bottom:8px solid #111;
  border-radius:0 0 60px 60px;
  bottom:95px;
  left:50%;
  transform:translateX(-50%);
}

.fuinha{
  position:absolute;
  top:-30px;
  right:-30px;
  background:#ff2e63;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  font-weight:700;
  box-shadow:0 0 25px rgba(255,46,99,.5);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
}

/* CARD */

.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;
  padding:22px;
  cursor:pointer;
  transition:.3s;
  text-align:center;
  backdrop-filter:blur(12px);
}

.card:hover{
  transform:translateY(-7px) scale(1.05);
  background:white;
  color:#ff2e63;
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.popup.active{
  opacity:1;
  pointer-events:all;
}

.popup-box{
  width:90%;
  max-width:700px;
  background:white;
  color:#111;
  border-radius:35px;
  padding:40px;
  text-align:center;
}

.popup-box h2{
  color:#ff2e63;
  font-size:2.5rem;
  margin-bottom:15px;
}

.popup-box p{
  font-size:1.3rem;
  line-height:1.9;
}

.close{
  position:absolute;
  top:15px;
  right:22px;
  font-size:2.2rem;
  cursor:pointer;
}

/* HEARTS */

.heart{
  position:fixed;
  bottom:-20px;
  color:rgba(255,255,255,.15);
  animation:up linear infinite;
  z-index:-1;
}

@keyframes up{
  from{transform:translateY(0);}
  to{transform:translateY(-120vh);}
}

/* FLOAT */

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- VIDEO COM SOM -->
<video id="video" autoplay loop playsinline class="bg-video">
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4" type="video/mp4">
</video>

<!-- BOTÃO SOM -->
<button class="sound-btn" onclick="ativarSom()">
🔊 Ativar Som ❤️
</button>

<div class="glow"></div>
<div class="glow glow2"></div>

<div class="container">

  <div class="title">
    <h1 id="titulo">LARISSA ❤️</h1>
    <p>Minha delícia • Minha cabeçuda • Minha cara de fuinha 😭❤️</p>
  </div>

  <div class="head-wrapper">

    <div class="fuinha">fuinha 😭</div>

    <div class="head-shadow"></div>

    <div class="face">
      <div class="hair"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
    </div>

  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
  </div>
</div>

<script>

/* SOM */
function ativarSom(){

  const video = document.getElementById("video");
  video.muted = false;
  video.volume = 1;
  video.play();

  document.querySelector(".sound-btn").style.display = "none";

  // efeito visual
  document.getElementById("titulo").style.transform = "scale(1.08)";
}

/* DADOS */

const itens = [

["Cabeçona","Larissa sua cabeça é tão grande que virou satélite natural 😭❤️"],

["Testona","Essa testona parece tela de cinema IMAX KKKK 😩"],

["Bundona","Esse bundão altera a gravidade do planeta 😭"],

["Cheiro","Seu cheiro me vicia mais que tudo 😩❤️"],

["Abraço","Seu abraço é meu lugar favorito no mundo ❤️"],

["Sentada","Sua sentada desliga qualquer sistema 😭"],

["Gemido","Seu gemido deveria tocar no Spotify 😩"],

["Xerecona","Patrimônio mundial da humanidade 😳❤️"],

["Xulé","Perigo biológico nível máximo ☣️😭"],

["Fuinha","Sua cara de fuinha é perfeita demais 😭❤️"],

["Gostosa","Você é simplesmente absurda 😩❤️"],

["Amor","Você é o amor da minha vida ❤️"]

];

const grid = document.getElementById("grid");

itens.forEach(i=>{

  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = i[0];

  div.onclick = ()=>openPopup(i[0],i[1]);

  grid.appendChild(div);

});

/* POPUP */

function openPopup(titulo,texto){

  document.getElementById("popup").classList.add("active");
  document.getElementById("popupTitle").innerText = titulo;
  document.getElementById("popupText").innerText = texto;

}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

/* CORAÇÕES */

setInterval(()=>{

  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*25+10)+"px";
  h.style.animationDuration = (Math.random()*5+5)+"s";

  document.body.appendChild(h);

  setTimeout(()=>h.remove(),10000);

},250);

</script>

</body>
</html>
