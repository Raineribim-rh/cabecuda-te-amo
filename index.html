<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  overflow:hidden;
  background:black;
  color:white;
}

/* VIDEO */

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-20;
  filter:brightness(.18) blur(1.2px);
}

/* OVERLAY */

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.35));
  z-index:-10;
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  background:#ff2e63;
  border:none;
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  color:white;
  z-index:9999;
  cursor:pointer;
}

/* TITULO */

.header{
  text-align:center;
  padding:30px 10px;
}

.header h1{
  font-size:4rem;
  background:linear-gradient(90deg,#fff,#ff7aa2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{
  opacity:.9;
}

/* ITENS FLUTUANTES */

.item{
  position:absolute;
  padding:10px 14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:999px;
  cursor:pointer;
  font-size:.9rem;
  backdrop-filter:blur(10px);
  animation:float linear infinite;
  transition:.3s;
}

.item:hover{
  transform:scale(1.15);
  background:white;
  color:#ff2e63;
}

@keyframes float{
  from{transform:translateY(120vh);}
  to{transform:translateY(-120vh);}
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.popup.active{
  opacity:1;
  pointer-events:all;
}

.box{
  width:90%;
  max-width:650px;
  background:white;
  color:#111;
  padding:35px;
  border-radius:25px;
  text-align:center;
  position:relative;
}

.box h2{
  color:#ff2e63;
  font-size:2rem;
  margin-bottom:10px;
}

/* X FECHAMENTO */

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2.2rem;
  cursor:pointer;
  font-weight:900;
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" autoplay loop playsinline>
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>
  <p>Clica nos elogios flutuantes 😭❤️</p>
</div>

<!-- POPUP -->
<div class="popup" id="popup">

  <div class="box">

    <div class="close" onclick="closePopup()">×</div>

    <h2 id="title"></h2>
    <p id="text"></p>

  </div>

</div>

<script>

/* SOM */

function ativarSom(){
  const v = document.getElementById("video");
  v.muted = false;
  v.volume = 1;
}

/* +40 ITENS FLUTUANTES */

const dados = [
["Cabeçona","Sua cabeça é tão grande que pega Wi-Fi no planeta inteiro 😭❤️"],
["Testona","Essa testona é IMAX nível cinema 😩"],
["Bundona","Esse bundão cria gravidade própria 😭"],
["Rabão","Planeta desacelera quando você passa 😩"],
["Xerecona","Patrimônio mundial da beleza 😳❤️"],
["Xulé","Arma biológica nível ONU ☣️😭"],
["Cheiro","Seu cheiro vicia mais que droga 😩"],
["Abraço","Seu abraço prende minha alma ❤️"],
["Sentada","Sua sentada derruba servidor 😭"],
["Gemido","Seu gemido deveria estar no Spotify 😩"],
["Beiço","Seu beiço de periquito é absurdo 😭❤️"],
["Beijo","Te beijar apaga minha mente 😩"],
["Bocona","Sua boca é ilegal de tão linda 😭"],
["Olhos","Seus olhos me desmontam ❤️"],
["Sorriso","Seu sorriso destrói minha sanidade 😩"],
["Dormindo","Você dormindo parece anjo bugado 😭"],
["Brava","Até brava você é gostosa 😩"],
["Manhosa","Seu drama é perfeito ❤️"],
["Dengosa","Você é puro dengo 😭"],
["Cheiro cabelo","Seu cabelo vicia 😩"],
["Pescoço","Seu pescoço é área de perigo ❤️"],
["Nariz","Narizinho fofo absurdo 😭"],
["Orelha","Até sua orelha é linda 😩"],
["Coxas","Essas coxas são ameaça global 😭"],
["Pés","Até seu pé é injusto 😩"],
["Peitinho","Perfeição em forma humana ❤️"],
["Rabudinha","Crime de tão perfeito 😭"],
["Gostosa","Você é absurda 😩"],
["Delícia","Definição de perfeição ❤️"],
["Amor","Você é minha vida 😭"],
["Fuinha","Cara de fuinha mais linda do mundo 😩"],
["Risada","Sua risada cura tudo ❤️"],
["Gemidona","Isso não deveria existir 😭"],
["Abraçona","Abraço nível cura mundial 😩"],
["Cheirosa","Perfume natural perfeito ❤️"],
["Tesão","Você é o conceito 😭"],
["Perfeita","Erro zero na criação 😩"],
["Vida","Você é tudo ❤️"],
["Minha","Minha pessoa favorita 😭"]
];

function spawn(){

  dados.forEach((d,i)=>{

    const el = document.createElement("div");
    el.className="item";
    el.innerText=d[0];

    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(Math.random()*20+15)+"s";
    el.style.top="100vh";

    el.onclick=()=>open(d[0],d[1]);

    document.body.appendChild(el);

  });

}

spawn();

/* POPUP */

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("title").innerText=t;
  document.getElementById("text").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
