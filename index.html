<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<style>

html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* VIDEO */

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-10;
  filter:brightness(.25);
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
  background:#ff2e63;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
}

/* HEADER */

.header{
  position:relative;
  text-align:center;
  color:white;
  padding:20px;
  z-index:2;
}

.header h1{
  font-size:3rem;
}

/* CABEÇONA (DESENHO CSS) */

.head{
  width:170px;
  height:200px;
  background:#ffd4b8;
  border-radius:50%;
  margin:10px auto;
  position:relative;
  border:4px solid #111;
}

.head::before{
  content:"";
  position:absolute;
  width:200px;
  height:120px;
  background:#111;
  top:-30px;
  left:-15px;
  border-radius:50%;
}

/* OLHOS */

.eye{
  width:20px;
  height:20px;
  background:#111;
  border-radius:50%;
  position:absolute;
  top:90px;
}

.eye.left{left:45px;}
.eye.right{right:45px;}

/* BOCA */

.mouth{
  width:60px;
  height:25px;
  border-bottom:4px solid #111;
  border-radius:50%;
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

/* ITENS */

.item{
  position:fixed;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  z-index:3;
  transition:.3s;
}

.item:hover{
  transform:scale(1.1);
  background:white;
  color:#ff2e63;
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.popup.active{
  display:flex;
}

.box{
  width:90%;
  max-width:500px;
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
  text-align:center;
  position:relative;
}

.box h2{
  color:#ff2e63;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- VIDEO (FUNCIONA SEM BLOQUEIO) -->
<video id="video" autoplay loop muted playsinline>
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>

  <div class="head">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>

  <p>cabeçuda • fuinha • minha delícia 😭❤️</p>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="t"></h2>
    <p id="p"></p>
  </div>
</div>

<script>

/* SOM (FUNCIONA SOMENTE COM CLIQUE) */
function ativarSom(){
  const v=document.getElementById("video");
  v.muted=false;
  v.volume=1;
}

/* ITENS */

const itens = [
["Cabeçona","Sua cabeça gigante e perfeita 😭❤️"],
["Fuinha","Sua cara de fuinha é única 😩❤️"],
["Testa","IMAX total 😭"],
["Xerecona","Perfeição proibida 😳❤️"],
["Beiço","Beiço de periquito lindo 😩❤️"],
["Cheiro","Seu cheiro vicia 😭"],
["Abraço","Seu abraço cura tudo ❤️"],
["Sentada","Impacto mundial 😩"],
["Gemido","Isso deveria ser ilegal 😭"],
["Olhos","Me desmonta ❤️"],
["Sorriso","Meu ponto fraco 😩"],
["Rabão","Gravidade própria 😭"],
["Gostosa","Inacreditável 😩"],
["Amor","Você é tudo ❤️"],
["Delícia","Definição perfeita 😭"],
["Coxas","Crime global 😩"],
["Boca","Perfeita 😭"],
["Nariz","Fofo demais 😩"],
["Cheirosa","Vício absoluto ❤️"],
["Vida","Meu tudo 😭"],
["Abraçona","Segurança total 😩"],
["Brava","Até brava é linda 😭"],
["Dengosa","Perfeição ❤️"],
["Risada","Cura tudo 😩"],
["Gemidona","Absurdamente proibido 😭"]
];

/* POSIÇÕES FIXAS */

const pos = [
[10,20],[25,30],[40,15],[60,25],[75,20],
[15,60],[35,55],[55,60],[70,65],[85,55],
[20,75],[45,80],[65,75],[80,85],[30,10],
[50,40],[70,40],[85,35],[15,40],[10,50],
[60,10],[40,35],[25,70],[55,85],[75,50]
];

const body=document.body;

itens.forEach((i,index)=>{

  const el=document.createElement("div");
  el.className="item";
  el.innerText=i[0];

  el.style.left=pos[index][0]+"vw";
  el.style.top=pos[index][1]+"vh";

  el.onclick=()=>open(i[0],i[1]);

  body.appendChild(el);

});

/* POPUP */

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("t").innerText=t;
  document.getElementById("p").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
