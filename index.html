<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<style>

html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* VIDEO FUNDO */

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-10;
  filter:brightness(.25);
}

/* CAMADA */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:-5;
}

/* TOPO */

.header{
  position:relative;
  z-index:5;
  text-align:center;
  color:white;
  padding:20px;
}

.header h1{
  font-size:3rem;
}

.header p{
  opacity:.9;
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
  background:#ff2e63;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}

/* IMAGEM CENTRAL */

.center{
  position:relative;
  z-index:3;
  text-align:center;
  margin-top:10px;
}

.center img{
  width:180px;
  border-radius:20px;
  border:3px solid white;
  box-shadow:0 0 20px rgba(255,255,255,.3);
}

/* ITENS FIXOS */

.item{
  position:fixed;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:12px 16px;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  backdrop-filter:blur(8px);
  transition:.3s;
  z-index:3;
}

.item:hover{
  transform:scale(1.1);
  background:white;
  color:#ff2e63;
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.popup.active{
  display:flex;
}

.box{
  width:90%;
  max-width:500px;
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
  text-align:center;
  position:relative;
}

.box h2{
  color:#ff2e63;
}

/* X */

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" autoplay loop playsinline>
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<div class="overlay"></div>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>
  <p>cabeçuda • fuinha • minha delícia 😭❤️</p>
</div>

<div class="center">
  <!-- coloque sua imagem aqui -->
  <img src="https://i.imgur.com/8Km9tLL.png" alt="Larissa">
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="t"></h2>
    <p id="p"></p>
  </div>
</div>

<script>

/* SOM */
function ativarSom(){
  const v=document.getElementById("video");
  v.muted=false;
  v.volume=1;
}

/* ITENS FIXOS NA TELA */

const itens = [
["Cabeçuda","Sua cabeça é enorme e perfeita 😭❤️"],
["Fuinha","Sua cara de fuinha é única 😩❤️"],
["Testa","Testa nível cinema IMAX 😭"],
["Xerecona","Patrimônio mundial 😳❤️"],
["Beiço","Beiço de periquito lindo 😩❤️"],
["Cheiro","Seu cheiro vicia 😭"],
["Abraço","Seu abraço cura tudo ❤️"],
["Sentada","Impacto global 😩"],
["Gemido","Isso é ilegal 😭"],
["Olhos","Me desmonta ❤️"],
["Sorriso","Meu ponto fraco 😩"],
["Rabão","Gravidade própria 😭"],
["Gostosa","Inacreditável 😩"],
["Amor","Você é tudo ❤️"],
["Delícia","Definição perfeita 😭"],
["Coxas","Crime internacional 😩"],
["Boca","Perfeita demais 😭"],
["Nariz","Fofo absurdo 😩"],
["Cheirosa","Vício total ❤️"],
["Vida","Meu tudo 😭"]
];

/* POSIÇÕES FIXAS */

const positions = [
[10,20],[30,70],[70,30],[50,10],[80,80],
[20,40],[60,60],[40,80],[15,60],[85,40],
[25,25],[75,75],[55,20],[35,50],[65,10],
[10,80],[90,20],[45,70],[60,35],[20,90]
];

const body=document.body;

/* SPAWN */

itens.forEach((i,idx)=>{

  const el=document.createElement("div");
  el.className="item";
  el.innerText=i[0];

  const pos=positions[idx];

  el.style.left=pos[0]+"vw";
  el.style.top=pos[1]+"vh";

  el.onclick=()=>open(i[0],i[1]);

  body.appendChild(el);

});

/* POPUP */

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("t").innerText=t;
  document.getElementById("p").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
