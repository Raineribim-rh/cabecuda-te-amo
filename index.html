<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Larissa ❤️</title>

<style>

html, body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* VÍDEO (ESSENCIAL — NÃO MEXER) */

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-10;
  filter:brightness(.35);
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  z-index:9999;
  background:#ff2e63;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:999px;
  cursor:pointer;
}

/* HEADER */

.header{
  position:relative;
  text-align:center;
  color:white;
  padding:20px;
}

.header h1{
  font-size:3rem;
}

/* ITENS */

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:10px;
}

.item{
  background:rgba(255,255,255,.12);
  color:white;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  border:1px solid rgba(255,255,255,.2);
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}

.popup.active{
  display:flex;
}

.box{
  width:90%;
  max-width:500px;
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
  text-align:center;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:2rem;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- VÍDEO (RAW FUNCIONANDO) -->
<video id="video" autoplay loop muted playsinline>
  <source src="https://github.com/Raineribim-rh/cabecuda-te-amo/raw/refs/heads/main/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>
</div>

<!-- ITENS -->
<div class="grid" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="t"></h2>
    <p id="p"></p>
  </div>
</div>

<script>

/* SOM (OBRIGATÓRIO CLIQUE) */
function ativarSom(){
  const v=document.getElementById("video");
  v.muted=false;
  v.play();
}

/* ITENS */

const itens = [
["Cabeçuda","Cabeça gigante e fofa 😭❤️"],
["Fuinha","Cara de fuinha kkk 😩"],
["Testa","IMAX total 😭"],
["Olhos","Hipnose pura ❤️"],
["Sorriso","Perdição 😩"],
["Beiço","Perfeito demais 😭"],
["Cheiro","Vício absurdo 😩"],
["Abraço","Segurança total ❤️"],
["Brava","Mesmo assim linda 😭"],
["Manhosa","Perfeição 😩"],
["Coxas","Zoeira nível absurdo 😭"],
["Boca","Perfeita ❤️"],
["Nariz","Fofo demais 😩"],
["Risada","Cura tudo 😭"],
["Vida","Meu tudo ❤️"],
["Amor","Você é isso 😩"],
["Gostosa (zoeira)","Você é absurda 😭"],
["Delícia","Definição ❤️"],
["Cheirosa","Vício total 😩"],
["Minha","Só minha 😭"]
];

const grid=document.getElementById("grid");

itens.forEach(i=>{
  const el=document.createElement("div");
  el.className="item";
  el.innerText=i[0];
  el.onclick=()=>open(i[0],i[1]);
  grid.appendChild(el);
});

/* POPUP */

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("t").innerText=t;
  document.getElementById("p").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
