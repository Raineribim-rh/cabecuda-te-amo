<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️ Minha Delícia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:black;
  overflow-x:hidden;
  color:white;
}

/* VIDEO */

.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-20;
  filter:brightness(.18) blur(1.4px);
}

/* OVERLAY */

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.4));
  z-index:-10;
}

/* BOTÃO SOM */

.sound{
  position:fixed;
  top:15px;
  right:15px;
  background:#ff2e63;
  border:none;
  padding:12px 18px;
  border-radius:999px;
  color:white;
  font-weight:800;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 0 25px rgba(255,46,99,.5);
}

/* TITULO */

.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  font-size:4rem;
  background:linear-gradient(90deg,#fff,#ff7aa2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header p{
  opacity:.9;
  margin-top:10px;
}

/* CABEÇUDA */

.face-box{
  width:280px;
  height:350px;
  margin:20px auto 40px;
  position:relative;
  animation:float 3s infinite ease-in-out;
}

.face{
  width:100%;
  height:100%;
  background:#ffd4b8;
  border:6px solid #111;
  border-radius:55%;
  position:absolute;
}

.hair{
  width:115%;
  height:160px;
  background:#111;
  position:absolute;
  top:-10px;
  left:-7%;
  border-radius:60%;
}

.eye{
  width:35px;
  height:35px;
  background:#111;
  border-radius:50%;
  position:absolute;
  top:140px;
}

.left{left:60px;}
.right{right:60px;}

.mouth{
  width:80px;
  height:40px;
  border-bottom:6px solid #111;
  border-radius:0 0 50px 50px;
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:14px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:18px;
  border-radius:18px;
  text-align:center;
  cursor:pointer;
  transition:.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:scale(1.05);
  background:white;
  color:#ff2e63;
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.popup.active{
  opacity:1;
  pointer-events:all;
}

.box{
  width:90%;
  max-width:700px;
  background:white;
  color:#111;
  padding:35px;
  border-radius:25px;
  text-align:center;
}

.box h2{
  color:#ff2e63;
  margin-bottom:10px;
  font-size:2.2rem;
}

.close{
  position:absolute;
  right:20px;
  top:15px;
  font-size:2rem;
  cursor:pointer;
}

/* FLOAT */

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="video" autoplay loop playsinline class="bg-video">
  <source src="https://raw.githubusercontent.com/Raineribim-rh/cabecuda-te-amo/02bc005806d2d8c935c9ab813bf112533b83408e/Nao_ficanos_parecidos_Nao_mud.mp4">
</video>

<button class="sound" onclick="ativarSom()">🔊 Som</button>

<div class="header">
  <h1>LARISSA ❤️</h1>
  <p>minha cabeçuda, minha delícia, minha fuinha perfeita</p>
</div>

<div class="face-box">
  <div class="face">
    <div class="hair"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="popup" id="popup">
  <div class="box">
    <div class="close" onclick="closePopup()">×</div>
    <h2 id="t"></h2>
    <p id="p"></p>
  </div>
</div>

<script>

/* SOM */
function ativarSom(){
  const v = document.getElementById("video");
  v.muted = false;
  v.volume = 1;
  v.play();
}

/* +40 ELOGIOS INTUITIVOS */

const data = [
["Cabeçona","Sua cabeça é tão grande que pega Wi-Fi no mundo inteiro 😭❤️"],
["Testona","Essa testona é uma tela de cinema IMAX 😩"],
["Bundona","Esse bundão tem gravidade própria 😭"],
["Rabão","O planeta gira mais devagar quando você passa 😩"],
["Xerecona","Patrimônio mundial da sensualidade 😳❤️"],
["Xulé","Arma biológica nível ONU ☣️😭"],
["Cheiro","Seu cheiro é literalmente vício puro 😩"],
["Cheirinho","Cheiro de felicidade grudado em você ❤️"],
["Abraço","Seu abraço é prisão perpétua feliz 😭❤️"],
["Sentada","Sua sentada derruba servidores 😩"],
["Gemido","Seu gemido deveria ser patrimônio do Spotify 😭"],
["Beiço","Seu beiço de periquito é criminosamente lindo 😩❤️"],
["Beijinho","Te beijar é perder a consciência 😭"],
["Bocona","Essa boca deveria ser proibida por lei 😩"],
["Olhos","Seus olhos me desarmam inteiro ❤️"],
["Sorriso","Seu sorriso reinicia meu cérebro 😭"],
["Dormindo","Você dormindo parece erro de Deus de tão perfeita 😩"],
["Brava","Até brava você é gostosa 😭"],
["Manhosa","Seu drama é minha religião ❤️"],
["Dengosa","Dengo absurdo nível mundial 😩"],
["Cheiro cabelo","Seu cabelo tem cheiro de vício 😭"],
["Pescoço","Seu pescoço é área de risco emocional ❤️"],
["Orelha","Até sua orelha é perfeita 😩"],
["Nariz","Narizinho fofo nível absurdo 😭"],
["Coxas","Essas coxas são uma ameaça global 😩"],
["Pés","Até seu pé é injusto de tão bonito 😭"],
["Peitinho","Perfeição em forma de pessoa ❤️"],
["Rabudinha","O maior patrimônio do planeta 😩"],
["Gostosa","Você é ilegal de tão perfeita 😭"],
["Delícia","Definição literal de perfeição ❤️"],
["Amor","Você é meu universo inteiro 😩❤️"],
["Fuinha","Sua cara de fuinha é minha religião 😭"],
["Risada","Sua risada salva meu dia ❤️"],
["Gemidona","Isso não é humano de tão bom 😩"],
["Abraçona","Abraço que cura depressão 😭"],
["Cheirosa","Perfume natural absurdo ❤️"],
["Tesão","Você é o conceito inteiro 😩"],
["Perfeita","Erro nenhum na sua criação 😭"],
["Vida","Você é minha vida inteira ❤️"]
];

const grid = document.getElementById("grid");

data.forEach(i=>{
  const c = document.createElement("div");
  c.className="card";
  c.innerHTML=i[0];
  c.onclick=()=>open(i[0],i[1]);
  grid.appendChild(c);
});

function open(t,p){
  document.getElementById("popup").classList.add("active");
  document.getElementById("t").innerText=t;
  document.getElementById("p").innerText=p;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
}

</script>

</body>
</html>
